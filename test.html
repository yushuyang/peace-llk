<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>太平年连连看 - 资源测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        h1 { text-align: center; color: white; margin-bottom: 10px; }
        .status { text-align: center; color: #ffd700; margin-bottom: 20px; }
        .test-section {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-section h3 { color: #667eea; margin-bottom: 15px; }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
        }
        .image-item {
            text-align: center;
        }
        .image-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid #ddd;
            background: #f5f5f5;
        }
        .image-item .name {
            font-size: 12px;
            color: #333;
            margin-top: 5px;
        }
        .image-item .status {
            font-size: 10px;
            color: #666;
        }
        .ok { color: #4CAF50 !important; }
        .error { color: #f44336 !important; }
        .file-list {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
        }
        .file-item { padding: 3px 0; border-bottom: 1px solid #eee; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>🔍 太平年连连看 - 资源测试</h1>
    <p class="status">服务器端口: 8090 | 测试时间: <span id="time"></span></p>
    
    <div class="test-section">
        <h3>📁 项目文件结构</h3>
        <div id="fileList" class="file-list">加载中...</div>
    </div>
    
    <div class="test-section">
        <h3>🖼️ 角色图片资源 (13张)</h3>
        <div class="image-grid" id="imageGrid"></div>
    </div>
    
    <div class="test-section">
        <h3>✅ 测试结果</h3>
        <div id="testResult">
            <p>图片加载中...</p>
        </div>
    </div>
    
    <div class="test-section">
        <h3>📱 微信小程序测试说明</h3>
        <p>微信小程序必须在<strong>微信开发者工具</strong>中运行，无法通过浏览器直接测试。</p>
        <p>请按以下步骤操作：</p>
        <ol style="margin-left: 20px; line-height: 2;">
            <li>下载 <a href="https://developers.weixin.qq.com/miniprogram/dev/devtools/download.html" target="_blank">微信开发者工具</a></li>
            <li>打开开发者工具，点击「导入项目」</li>
            <li>选择项目目录：<code>~/peace-llk/</code></li>
            <li>AppID 选择「使用测试号」</li>
            <li>点击「确定」运行</li>
        </ol>
    </div>

<script>
document.getElementById('time').textContent = new Date().toLocaleString();

// 测试文件列表
const files = [
    'app.js', 'app.json', 'app.wxss',
    'js/LinkUpGame.js', 'js/TaiPingCharacters.js',
    'pages/index/index.js', 'pages/index/index.wxml', 'pages/index/index.wxss',
    'pages/game/game.js', 'pages/game/game.wxml', 'pages/game/game.wxss',
    'pages/characters/characters.js', 'pages/characters/characters.wxml'
];

const fileListEl = document.getElementById('fileList');
fileListEl.innerHTML = '';

files.forEach(file => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.textContent = `📄 ${file}`;
    fileListEl.appendChild(div);
});

// 测试图片加载
const images = [];
for (let i = 1; i <= 13; i++) {
    images.push({
        id: i,
        name: `角色${i}`,
        path: `images/char${String(i).padStart(2, '0')}.png`
    });
}

const gridEl = document.getElementById('imageGrid');
const results = { success: 0, failed: 0 };

images.forEach(img => {
    const item = document.createElement('div');
    item.className = 'image-item';
    
    const image = document.createElement('img');
    image.src = img.path;
    image.alt = img.name;
    
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = img.name;
    
    const status = document.createElement('div');
    status.className = 'status';
    status.id = `status-${img.id}`;
    status.textContent = '加载中...';
    
    image.onload = () => {
        status.textContent = '✓ 成功';
        status.className = 'status ok';
        results.success++;
        updateResult();
    };
    
    image.onerror = () => {
        status.textContent = '✗ 失败';
        status.className = 'status error';
        results.failed++;
        updateResult();
    };
    
    item.appendChild(image);
    item.appendChild(name);
    item.appendChild(status);
    gridEl.appendChild(item);
});

function updateResult() {
    const resultEl = document.getElementById('testResult');
    const total = results.success + results.failed;
    if (total === images.length) {
        if (results.failed === 0) {
            resultEl.innerHTML = `<p class="ok">✅ 所有图片加载成功！共 ${results.success} 张</p>`;
        } else {
            resultEl.innerHTML = `<p><span class="ok">✓ 成功: ${results.success}</span> | <span class="error">✗ 失败: ${results.failed}</span></p>`;
        }
    }
}
</script>
</body>
</html>
